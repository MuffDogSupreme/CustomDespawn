# =========================================================================
# CustomDespawn — Configuration Engine
# =========================================================================

# The fallback despawn time if an item doesn't match any custom categories.
# Format: Use 's' for seconds, 'm' for minutes. (e.g., 45s, 3m)
default-despawn-time: "1m"

# Toggles whether items dropped by a player dying should follow a separate rule.
honor-player-death-drops: true
death-drop-despawn-time: "5m"

# Global World Blacklist
blacklisted-worlds:
  - "creative_world"
  - "test_sandbox"

# Granular item categorization. Items check from top to bottom.
custom-rules:
  trash-items:
    time: "15s"
    materials:
      - COBBLESTONE
      - NETHERRACK
      - DIRT
      - SAND
      - ROTTEN_FLESH
      - KELP
  valuable-items:
    time: "8m"
    materials:
      - DIAMOND
      - NETHERITE_INGOT
      - ENCHANTED_GOLDEN_APPLE
